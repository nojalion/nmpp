<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMMP</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --accent-color: #1db954; 
            --delete-color: #ff5252;
            --text-color: #ffffff;
            --text-sub: #b3b3b3;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .player-card {
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        h2 { margin-top: 0; font-size: 1.4rem; }
        
        .file-input-label {
            display: block;
            background-color: var(--accent-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 0.95rem;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .file-input-label:hover { transform: scale(1.02); }
        input[type="file"] { display: none; }

        .now-playing { margin: 20px 0; min-height: 50px; }
        .track-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; word-break: break-all; }
        
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        .btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .btn:hover { color: var(--accent-color); }
        .btn-play {
            font-size: 2.5rem;
            background-color: var(--text-color);
            color: var(--bg-color);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-play:hover { transform: scale(1.05); }

        /* 💡 プレイリストのヘッダーをフレックスボックス化 */
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding-bottom: 5px;
            border-bottom: 1px solid #282828;
        }
        .playlist-title {
            font-size: 0.9rem;
            color: var(--text-sub);
        }
        /* 💡 一括削除ボタンのスタイル（控えめな赤文字） */
        .btn-clear-all {
            background: none;
            border: none;
            color: var(--delete-color);
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            padding: 0;
            display: none; /* 初期状態（空）は非表示 */
        }
        .btn-clear-all:hover { opacity: 1; }

        .playlist-container {
            text-align: left;
            height: 180px;         
            overflow-y: auto;       
            padding-top: 5px;
            padding-right: 3px;     
        }

        .playlist-container::-webkit-scrollbar { width: 6px; }
        .playlist-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 3px; }
        .playlist-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 3px; }
        .playlist-container::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            font-size: 0.9rem;
            color: var(--text-sub);
            border-radius: 5px;
            margin-bottom: 2px;
        }
        .playlist-item:hover { background-color: #282828; }
        .playlist-item.active { color: var(--accent-color); font-weight: bold; }
        
        .song-info {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .delete-icon {
            cursor: pointer;
            font-size: 1rem;
            padding-left: 10px;
            color: #555;
            transition: color 0.2s;
        }
        .delete-icon:hover { color: var(--delete-color); }
        
        .status-msg {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="player-card">
    <h2>NMMP</h2>
    
    <label class="file-input-label" for="audio-picker">🦉 アプリに曲を追加する</label>
    <input type="file" id="audio-picker" accept="audio/mp3, audio/*" multiple>

    <div id="status-text" class="status-msg"></div>

    <div class="now-playing">
        <div class="track-title" id="current-title">- No Tracks -</div>
    </div>

    <div class="controls">
        <button class="btn" id="btn-prev">⏮</button>
        <button class="btn btn-play" id="btn-play-toggle">▶</button>
        <button class="btn" id="btn-next">⏭</button>
    </div>

    <!-- 💡 レイアウト変更：タイトルと一括削除を並行に -->
    <div class="playlist-header">
        <div class="playlist-title">保存済みのプレイリスト</div>
        <button class="btn-clear-all" id="btn-clear-all">🗑️ 全て削除</button>
    </div>
    <div class="playlist-container" id="playlist-view"></div>
</div>

<script>
    const state = {
        queue: [],          
        currentIndex: 0,
        isPlaying: false
    };

    const audioEngine = new Audio();

    const picker = document.getElementById('audio-picker');
    const titleView = document.getElementById('current-title');
    const playBtn = document.getElementById('btn-play-toggle');
    const prevBtn = document.getElementById('btn-prev');
    const nextBtn = document.getElementById('btn-next');
    const playlistView = document.getElementById('playlist-view');
    const clearAllBtn = document.getElementById('btn-clear-all'); // 💡 追加
    const statusText = document.getElementById('status-text');

    const DB_NAME = 'SoundPlayerDB';
    const STORE_NAME = 'songs';

    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'name' });
                }
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    }

    async function saveSongToDB(file) {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.put({ name: file.name, data: file });
            transaction.oncomplete = () => resolve();
            transaction.onerror = (e) => reject(e.target.error);
        });
    }

    async function loadSongsFromDB() {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    }

    async function deleteSongFromDB(name) {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.delete(name);
            transaction.oncomplete = () => resolve();
            transaction.onerror = (e) => reject(e.target.error);
        });
    }

    // 💡 データベースの一括クリア処理 (TRUNCATE)
    async function clearAllSongsFromDB() {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.clear(); // 全レコード削除
            transaction.oncomplete = () => resolve();
            transaction.onerror = (e) => reject(e.target.error);
        });
    }

    window.addEventListener('DOMContentLoaded', async () => {
        statusText.innerText = "ライブラリを読み込み中...";
        await refreshLibrary();
        statusText.innerText = "";
        
        if (state.queue.length > 0) {
            setupInitialTrack(0);
        }
    });

    async function refreshLibrary() {
        state.queue = await loadSongsFromDB();
        renderPlaylist();
    }

    picker.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        statusText.innerText = "曲をアプリに保存中...";
        await Promise.all(files.map(file => saveSongToDB(file)));
        await refreshLibrary();
        statusText.innerText = "保存が完了しました！";
        setTimeout(() => statusText.innerText = "", 3000);
    });

    function loadAndPlay(index) {
        if (index < 0 || index >= state.queue.length) return;
        state.currentIndex = index;

        const songRecord = state.queue[index];
        titleView.innerText = songRecord.name.replace(/\.[^/.]+$/, "");

        if (audioEngine.src) { URL.revokeObjectURL(audioEngine.src); }
        audioEngine.src = URL.createObjectURL(songRecord.data);
        
        audioEngine.play().catch(err => console.log("再生エラー:", err));
        updatePlaylistHighlight();
        setupMediaSession(songRecord.name.replace(/\.[^/.]+$/, ""));
    }

    function setupInitialTrack(index) {
        state.currentIndex = index;
        const songRecord = state.queue[index];
        titleView.innerText = songRecord.name.replace(/\.[^/.]+$/, "");
        updatePlaylistHighlight();
    }

    function playNext() {
        if (state.queue.length === 0) return;
        let nextIdx = state.currentIndex + 1;
        if (nextIdx >= state.queue.length) nextIdx = 0;
        loadAndPlay(nextIdx);
    }

    function playPrev() {
        if (state.queue.length === 0) return;
        let prevIdx = state.currentIndex - 1;
        if (prevIdx < 0) prevIdx = state.queue.length - 1;
        loadAndPlay(prevIdx);
    }

    playBtn.addEventListener('click', () => {
        if (state.queue.length === 0) return;
        if (state.isPlaying) { audioEngine.pause(); } else { audioEngine.play(); }
    });

    nextBtn.addEventListener('click', () => playNext());
    prevBtn.addEventListener('click', () => playPrev());
    audioEngine.addEventListener('ended', () => playNext());
    audioEngine.addEventListener('play', () => { state.isPlaying = true; playBtn.innerText = '⏸'; });
    audioEngine.addEventListener('pause', () => { state.isPlaying = false; playBtn.innerText = '▶'; });

    // 💡 一括削除ボタンのクリックイベント
    clearAllBtn.addEventListener('click', async () => {
        if (state.queue.length === 0) return;

        if (confirm("このアプリ内のすべての曲を一括削除しますか？\nこの操作は取り消せません。")) {
            statusText.innerText = "ライブラリをクリア中...";

            // 1. 再生中のオーディオを安全に停止し、Object URLのメモリを解放
            audioEngine.pause();
            if (audioEngine.src) {
                URL.revokeObjectURL(audioEngine.src);
                audioEngine.src = "";
            }

            // 2. 状態管理（State）の初期化
            state.currentIndex = 0;
            state.isPlaying = false;

            // 3. データベースのクリアを実行
            await clearAllSongsFromDB();

            // 4. UIの更新
            await refreshLibrary();
            
            statusText.innerText = "すべての曲を削除しました。";
            setTimeout(() => statusText.innerText = "", 3000);
        }
    });

    function renderPlaylist() {
        playlistView.innerHTML = '';

        if (state.queue.length === 0) {
            playlistView.innerHTML = '<div class="status-msg" style="text-align:center; padding:20px;">曲が保存されていません。<br>上のボタンからインポートしてください。</div>';
            titleView.innerText = "- No Tracks -";
            clearAllBtn.style.display = 'none'; // 💡 曲がないときはボタンを隠す
            return;
        }

        clearAllBtn.style.display = 'block'; // 💡 曲があるときだけ表示

        state.queue.forEach((song, index) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            
            const info = document.createElement('div');
            info.className = 'song-info';
            info.innerText = `${index + 1}. ${song.name.replace(/\.[^/.]+$/, "")}`;
            info.addEventListener('click', () => loadAndPlay(index));

            const deleteIcon = document.createElement('span');
            deleteIcon.className = 'delete-icon';
            deleteIcon.innerText = '🗑️';
            deleteIcon.addEventListener('click', async (e) => {
                e.stopPropagation(); 
                if (confirm(`「${song.name}」をアプリから削除しますか？`)) {
                    await deleteSongFromDB(song.name);
                    await refreshLibrary();
                    if (state.currentIndex >= state.queue.length && state.queue.length > 0) {
                        setupInitialTrack(0);
                    }
                }
            });

            item.appendChild(info);
            item.appendChild(deleteIcon);
            playlistView.appendChild(item);
        });
        updatePlaylistHighlight();
    }

    function updatePlaylistHighlight() {
        const items = playlistView.getElementsByClassName('playlist-item');
        for (let i = 0; i < items.length; i++) {
            if (i === state.currentIndex && state.queue.length > 0) {
                items[i].classList.add('active');
                items[i].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                items[i].classList.remove('active');
            }
        }
    }

    function setupMediaSession(title) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: title,
                artist: 'NMMP',
                album: 'IndexedDB Storage'
            });
            navigator.mediaSession.setActionHandler('play', () => audioEngine.play());
            navigator.mediaSession.setActionHandler('pause', () => audioEngine.pause());
            navigator.mediaSession.setActionHandler('previoustrack', () => playPrev());
            navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
        }
    }
</script>

</body>
</html>
