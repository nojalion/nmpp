<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMPP</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --accent-color: #1db954; /* 鮮やかなグリーン */
            --text-color: #ffffff;
            --text-sub: #b3b3b3;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .player-card {
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        h2 { margin-top: 0; font-size: 1.4rem; }
        
        /* ファイル選択ボタンのカスタム */
        .file-input-label {
            display: block;
            background-color: #282828;
            color: var(--text-color);
            padding: 10px;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .file-input-label:hover { background-color: #3e3e3e; }
        input[type="file"] { display: none; }

        /* 再生中情報の表示エリア */
        .now-playing {
            margin: 20px 0;
            min-height: 50px;
        }
        .track-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; word-break: break-all; }
        
        /* コントロール系 */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        .btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .btn:hover { color: var(--accent-color); }
        .btn-play {
            font-size: 2.5rem;
            background-color: var(--text-color);
            color: var(--bg-color);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-play:hover {
            background-color: var(--accent-color);
            color: var(--text-color);
            transform: scale(1.05);
        }

        /* プレイリスト表示エリア */
        .playlist-container {
            margin-top: 25px;
            text-align: left;
            max-height: 180px;
            overflow-y: auto;
            border-top: 1px solid #282828;
            padding-top: 15px;
        }
        .playlist-item {
            padding: 8px 10px;
            font-size: 0.9rem;
            color: var(--text-sub);
            cursor: pointer;
            border-radius: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .playlist-item:hover { background-color: #282828; color: var(--text-color); }
        .playlist-item.active { color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="player-card">
    <h2>My Sound Player</h2>
    
    <!-- MP3を複数選択するためのボタン -->
    <label class="file-input-label" for="audio-picker">🎵 曲を読み込む (複数選択可)</label>
    <input type="file" id="audio-picker" accept="audio/mp3, audio/*" multiple>

    <div class="now-playing">
        <div class="track-title" id="current-title">楽曲が選択されていません</div>
    </div>

    <!-- プレイヤーコントロール（文字アイコンで代用） -->
    <div class="controls">
        <button class="btn" id="btn-prev">⏮</button>
        <button class="btn btn-play" id="btn-play-toggle">▶</button>
        <button class="btn" id="btn-next">⏭</button>
    </div>

    <!-- プレイリスト表示 -->
    <div class="playlist-container" id="playlist-view"></div>
</div>

<script>
    // 状態管理オブジェクト（C++のクラスメンバ変数のようなもの）
    const state = {
        playlist: [],       // 選択されたファイルの配列
        currentIndex: 0,    // 現在再生中のインデックス
        isPlaying: false    // 再生フラグ
    };

    // 音声再生の実体（ブラウザ標準のAudioエンジン）
    const audioEngine = new Audio();

    // DOM要素の取得
    const picker = document.getElementById('audio-picker');
    const titleView = document.getElementById('current-title');
    const playBtn = document.getElementById('btn-play-toggle');
    const prevBtn = document.getElementById('btn-prev');
    const nextBtn = document.getElementById('btn-next');
    const playlistView = document.getElementById('playlist-view');

    // --- イベントリスナー（割り込み処理・コールバックの設定） ---

    // 1. ファイルが選択されたとき
    picker.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        state.playlist = files;
        state.currentIndex = 0;
        
        renderPlaylist();
        loadAndPlay(state.currentIndex);
    });

    // 2. 再生・一時停止ボタン
    playBtn.addEventListener('click', () => {
        if (state.playlist.length === 0) return;
        if (state.isPlaying) {
            audioEngine.pause();
        } else {
            audioEngine.play();
        }
    });

    // 3. 次の曲へ / 前の曲へ
    nextBtn.addEventListener('click', () => playNext());
    prevBtn.addEventListener('click', () => playPrev());

    // 4. 曲が最後まで再生し終わったとき（自動スキップ）
    audioEngine.addEventListener('ended', () => playNext());

    // 5. オーディオエンジンの状態変化をボタン表記に同期
    audioEngine.addEventListener('play', () => {
        state.isPlaying = true;
        playBtn.innerText = '⏸'; // 一時停止アイコンに
    });
    audioEngine.addEventListener('pause', () => {
        state.isPlaying = false;
        playBtn.innerText = '▶'; // 再生アイコンに
    });


    // --- 再生ロジック関数群 ---

    // 指定インデックスの曲を読み込んで再生
    function loadAndPlay(index) {
        if (index < 0 || index >= state.playlist.length) return;
        state.currentIndex = index;

        const file = state.playlist[index];
        titleView.innerText = file.name.replace(/\.[^/.]+$/, ""); // 拡張子を消して表示

        // 【最重要】ローカルのファイルをブラウザが読める一時的な仮想URLに変換（メモリ展開）
        if (audioEngine.src) {
            URL.revokeObjectURL(audioEngine.src); // メモリリーク防止（C++のdeleteに近い処理）
        }
        audioEngine.src = URL.createObjectURL(file);
        
        audioEngine.play().catch(err => console.log("再生エラー:", err));
        
        updatePlaylistHighlight();
        setupMediaSession(file.name.replace(/\.[^/.]+$/, "")); // iOS用のロック画面連携
    }

    function playNext() {
        if (state.currentIndex + 1 < state.playlist.length) {
            loadAndPlay(state.currentIndex + 1);
        } else {
            loadAndPlay(0); // 最後の曲なら最初に戻る（ループ）
        }
    }

    function playPrev() {
        if (state.currentIndex - 1 >= 0) {
            loadAndPlay(state.currentIndex - 1);
        } else {
            loadAndPlay(state.playlist.length - 1); // 最初なら最後の曲へ
        }
    }

    // --- 画面更新関数群 ---

    // プレイリストのテキスト一覧を生成
    function renderPlaylist() {
        playlistView.innerHTML = '';
        state.playlist.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            item.innerText = `${index + 1}. ${file.name.replace(/\.[^/.]+$/, "")}`;
            
            // リスト内の曲を直接タップして再生できるようにする
            item.addEventListener('click', () => loadAndPlay(index));
            playlistView.appendChild(item);
        });
    }

    // 現在再生中の曲をハイライト（緑色に）する
    function updatePlaylistHighlight() {
        const items = playlistView.children;
        for (let i = 0; i < items.length; i++) {
            if (i === state.currentIndex) {
                items[i].classList.add('active');
            } else {
                items[i].classList.remove('active');
            }
        }
    }

    // 【iOS対応】iPhoneのロック画面やコントロールセンターに曲名を出して操作可能にする
    function setupMediaSession(title) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: title,
                artist: 'My Sound Player',
                album: 'Local Storage'
            });
            
            // ロック画面のボタンとアプリの関数を紐付ける
            navigator.mediaSession.setActionHandler('play', () => audioEngine.play());
            navigator.mediaSession.setActionHandler('pause', () => audioEngine.pause());
            navigator.mediaSession.setActionHandler('previoustrack', () => playPrev());
            navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
        }
    }
</script>

</body>
</html>
